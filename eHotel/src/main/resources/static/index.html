<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eHotel App</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <main class="container">
    <h1>eHotel App</h1>
    <p>Application Java + PostgreSQL pour rechercher une chambre, faire une réservation et créer une location.</p>

    <nav class="tabs">
      <button class="tab-button active" data-tab="search">Recherche</button>
      <button class="tab-button" data-tab="reservation">Réservation</button>
      <button class="tab-button" data-tab="location">Location</button>
      <button class="tab-button" data-tab="data">Données</button>
    </nav>

    <div id="search" class="tab-content active">
      <section class="card">
        <h2>Recherche de chambres</h2>
      <form id="searchForm">
        <input name="zone" placeholder="Zone, ex. Ottawa Centre">
        <input name="capacite" type="number" min="1" value="1" placeholder="Capacité">
        <input name="prix" type="number" min="1" value="250" placeholder="Prix max">
        <input name="superficie" type="number" min="1" value="20" placeholder="Superficie min">
        <select name="chaine">
          <option value="">Toutes les chaînes</option>
        </select>
        <select name="categorie">
          <option value="0">Toutes les catégories</option>
          <option value="1">1 étoile</option>
          <option value="2">2 étoiles</option>
          <option value="3">3 étoiles</option>
          <option value="4">4 étoiles</option>
          <option value="5">5 étoiles</option>
        </select>
        <input name="dateDebut" type="date" placeholder="Date début">
        <input name="dateFin" type="date" placeholder="Date fin">
        <input name="nombreChambres" type="number" min="1" value="10" placeholder="Nombre de chambres">
        <button type="submit">Rechercher</button>
      </form>
      <div id="results"></div>
    </section>

    <section class="card">
      <h2>Créer une réservation</h2>
      <form id="reservationForm">
        <select name="clientId" required>
          <option value="">Sélectionner un client</option>
        </select>
        <select name="chambreId" required>
          <option value="">Sélectionner une chambre</option>
        </select>
        <input name="dateDebut" type="date" required>
        <input name="dateFin" type="date" required>
        <button type="submit">Réserver</button>
      </form>
    </section>

    <section class="card">
      <h2>Créer une location</h2>
      <form id="locationForm">
        <fieldset>
          <legend>Type de location</legend>
          <label><input type="radio" name="type" value="direct" checked> Directe</label>
          <label><input type="radio" name="type" value="conversion"> Conversion de réservation</label>
        </fieldset>
        <div id="directFields">
          <select name="clientId" required>
            <option value="">Sélectionner un client</option>
          </select>
          <select name="chambreId" required>
            <option value="">Sélectionner une chambre</option>
          </select>
          <input name="dateDebut" type="date" required>
          <input name="dateFin" type="date" required>
        </div>
        <div id="conversionFields" style="display: none;">
          <select name="reservationId" required>
            <option value="">Sélectionner une réservation</option>
          </select>
        </div>
        <select name="employeId" required>
          <option value="">Sélectionner un employé</option>
        </select>
        <button type="submit">Louer</button>
      </form>
    </section>

    <section class="card">
      <h2>Convertir une réservation en location</h2>
      <form id="convertForm">
        <select name="reservationId" required>
          <option value="">Sélectionner une réservation</option>
        </select>
        <select name="employeId" required>
          <option value="">Sélectionner un employé</option>
        </select>
        <button type="submit">Convertir</button>
      </form>
    </section>

    <div id="message" class="message"></div>

    <section class="card">
      <h2>Données</h2>
      <button id="loadDataBtn">Charger les données</button>
      <div id="data"></div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
